<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Exemple SVG – Présentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="dist/svg-presentation.js" defer></script>
</head>

<body class="svg-page">
  <nav class="main-nav main-nav-page">
    <a href="index.html" class="nav-link">Accueil GSAP</a>
    <a href="svg-presentation.html" class="nav-link nav-link-active">Exemple SVG présentation</a>
  </nav>

  <div class="wrapper-page">
    <div class="wrapper">
      <div class="caption">
        Exemple d’animation SVG simple simulant l’arrivée de blocs de contenu
        dans une diapositive (style présentation / vidéo).
      </div>

      <svg viewBox="0 0 960 540" role="img" aria-label="Exemple de diapositive animée">
        <!-- fond de diapo -->
        <defs>
          <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="50%" stop-color="#020617" />
            <stop offset="100%" stop-color="#111827" />
          </linearGradient>
          <linearGradient id="accentGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#a855f7" />
          </linearGradient>
        </defs>

        <!-- tracé externe animé (stroke-dasharray) -->
        <rect class="outer-outline" x="24" y="24" width="912" height="492" rx="26" />

        <rect x="24" y="24" width="912" height="492" rx="26" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2" />

        <!-- bandeau haut -->
        <rect x="24" y="24" width="912" height="76" rx="26" fill="rgba(15,23,42,0.9)" stroke="rgba(15,23,42,0.9)" />
        <rect x="40" y="42" width="140" height="12" rx="6" fill="url(#accentGrad)" />
        <rect x="40" y="62" width="90" height="8" rx="4" fill="#4b5563" />

        <!-- titre principal (animation machine à écrire) -->
        <g class="title-main">
          <text id="title-typewriter" x="80" y="160" fill="#e5e7eb" font-size="32" font-weight="600"></text>
        </g>

        <!-- sous-titre -->
        <g class="subtitle-main">
          <text x="80" y="196" fill="#9ca3af" font-size="18">
            Animation des éléments de contenu (style PowerPoint)
          </text>
        </g>

        <!-- bloc de contenu 1 (gauche) -->
        <g class="content-block block-1">
          <rect x="80" y="230" width="260" height="130" rx="18" fill="#020617" stroke="#1e293b" />
          <rect x="100" y="252" width="120" height="10" rx="5" fill="#e5e7eb" />
          <rect x="100" y="274" width="180" height="8" rx="4" fill="#64748b" />
          <rect x="100" y="292" width="160" height="8" rx="4" fill="#475569" />
          <rect x="100" y="314" width="110" height="8" rx="4" fill="#334155" />
        </g>

        <!-- bloc de contenu 2 (centre, type vidéo) -->
        <g class="content-block block-2">
          <rect x="360" y="230" width="260" height="180" rx="18" fill="#020617" stroke="#1e293b" />
          <!-- cadre vidéo -->
          <rect x="378" y="248" width="224" height="112" rx="14" fill="#020617" stroke="#1f2937" />
          <!-- bouton play avec glow -->
          <g class="play-glow">
            <circle cx="490" cy="304" r="26" fill="rgba(15,23,42,0.9)" />
            <polygon points="482,292 504,304 482,316" fill="#38bdf8" />
          </g>

          <!-- barre de progression -->
          <rect x="388" y="370" width="140" height="6" rx="3" fill="#1f2937" />
          <rect x="388" y="370" width="90" height="6" rx="3" fill="url(#accentGrad)" />
          <circle cx="478" cy="373" r="6" fill="#e5e7eb" />
        </g>

        <!-- bloc de contenu 3 (liste) -->
        <g class="content-block block-3">
          <rect x="640" y="230" width="240" height="180" rx="18" fill="#020617" stroke="#1e293b" />

          <!-- puces -->
          <circle cx="664" cy="262" r="4" fill="#38bdf8" />
          <rect x="678" y="256" width="160" height="8" rx="4" fill="#e5e7eb" />

          <circle cx="664" cy="292" r="4" fill="#38bdf8" />
          <rect x="678" y="286" width="140" height="8" rx="4" fill="#cbd5f5" />

          <circle cx="664" cy="322" r="4" fill="#38bdf8" />
          <rect x="678" y="316" width="150" height="8" rx="4" fill="#94a3b8" />

          <circle cx="664" cy="352" r="4" fill="#38bdf8" />
          <rect x="678" y="346" width="110" height="8" rx="4" fill="#64748b" />
        </g>

        <!-- anneau orbital + point en orbite (rotation continue) -->
        <g transform="translate(480 290)">
          <circle r="120" class="orbit-ring" />
          <circle r="7" fill="url(#accentGrad)" class="orbit-dot" />
        </g>

        <!-- petite timeline en bas (apparition finale) -->
        <g class="timeline-dot">
          <line x1="160" y1="430" x2="800" y2="430" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
          <circle cx="280" cy="430" r="7" fill="#38bdf8" />
          <circle cx="480" cy="430" r="7" fill="#a855f7" />
          <circle cx="680" cy="430" r="7" fill="#22c55e" />
        </g>
      </svg>
    </div>
  </div>
</body>

</html>
